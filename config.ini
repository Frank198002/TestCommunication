# ------------------------------------------------------------
# [thresholds] 阈值型参数（int，0~65534 = 发送该值，65535 = 禁用）
# 任意一项不为 65535，整组 Set_THreshold 命令即会发送
# ------------------------------------------------------------
[thresholds]

# 雨量阈值高位（int，0~65534）
RainTHHigh = 65535

# 倾斜角阈值（int，0~65534）
TiltAngTH = 65535

# 碰撞系数（int，0~65534）
CollisionCoef = 65535


# ------------------------------------------------------------
# [voltage] 充电电压参数（int，0~65534 = 发送该值，65535 = 禁用）
# 任意一项不为 65535，Set_recharge_voltage 命令即会发送
# 示例：ReChargeV = 148.5
# ------------------------------------------------------------
[voltage]

# 回充触发电压（Integer）：填实际电压×10的整数值，范围 150~170，下位机除以10得实际电压（V）
# 示例：165 → 实际电压 16.5V
ReChargeV = 65535

# 满充截止电压（Integer）：填实际电压×10的整数值，范围 150~170，下位机除以10得实际电压（V）
# 示例：200 → 实际电压 20.0V
FullV = 65535


# ------------------------------------------------------------
# [version] 控制板硬件版本号（int，hex）
# 赋 4 字节 hex 值 = 发送，65535 = 不发送
# 帧格式：[头] 07 05 00 [VER高→低 4字节] [checkSum]
# 示例：Hardware_VER = 0x01020304
# ------------------------------------------------------------
[version]

# 硬件版本号（十六进制，65535 = 不发送）
Hardware_VER = 65535



