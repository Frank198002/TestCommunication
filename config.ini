# ============================================================
# config.ini — TEST_COMMUNICATION 运行参数配置文件
# 修改本文件后直接运行 ./TEST_COMMUNICATION 即可生效，无需重新编译
#
# 统一规则：
#   65535 = 禁用（不发送该命令）
#   其他值 = 启用（发送该命令）
# 
# 纯命令型参数：
# [commands]   赋值 1 = 发送, 65535 = 不发送
# 
# 单字节带值型参数：
# [thresholds][voltage]   赋具体值 = 发送该值, 65535 = 不发送
# 
# 多字节带值型参数：
# [version] Hardware_VER：  赋 4 字节 hex 值 = 发送, 65535 = 不发送
# ============================================================


# ./TEST_COMMUNICATION                          ← 全部从 config.ini 读取
# ./TEST_COMMUNICATION /dev/ttyS3 3000 3000    ← 命令行覆盖串口和速度（兼容旧用法）

# 时间同步
# sudo systemctl restart systemd-timesyncd
# sudo systemctl stop systemd-timesyncd
# sudo systemctl start systemd-timesyncd

# 暂停机器原来的程序
# sudo systemctl stop xiaoyu.service 
# sudo systemctl disable xiaoyu.service




# ------------------------------------------------------------
# [system] 系统参数， 特殊：每次运行的时候读取，运行中间不会读取
# ------------------------------------------------------------
[system]

# 串口路径（字符串）
# Radxa 板: /dev/ttyS6    KickPi 板: /dev/ttyS3
serial_port = /dev/ttyS3

# 波特率（int）
baud_rate = 115200

# 发送消息循环间隔，单位：微秒（int）
# 500000 = 500ms
send_interval_us = 500000



# 以下参数，每次运行的时候，运行中间也会按时间间隔读取

# ------------------------------------------------------------
# [motor] 电机速度参数 RPM（int，单位R/min）
# ------------------------------------------------------------
[motor]

# 左轮速度（int，R/min）
left_velocity = 0

# 右轮速度（int，R/min）
right_velocity = 0


# ------------------------------------------------------------
# [commands] 纯命令型参数（int）
# 赋值 1   = 定时发送该命令
# 赋值 65535 = 不发送（禁用）
# ------------------------------------------------------------
[commands]

# 查询 PIN 码
pin_code_query = 65535

# 查询割草高度
cut_height_query = 65535

# 关闭报警
alarm_off = 65535

# 读取 EEPROM
read_eeprom = 65535


# 割草电机打开（发送固定命令：...03 01 + checkSum）
# 赋值 1 = 发送，65535 = 不发送
mow_motor_on = 65535

# 割草电机关闭（发送固定命令：...03 00 + checkSum）
# 赋值 1 = 发送，65535 = 不发送
mow_motor_off = 65535


# ------------------------------------------------------------
# [thresholds] 阈值型参数（int，0~65534 = 发送该值，65535 = 禁用）
# 任意一项不为 65535，整组 Set_THreshold 命令即会发送
# ------------------------------------------------------------
[thresholds]

# 雨量阈值高位（int，0~65534）
RainTHHigh = 65535

# 倾斜角阈值（int，0~65534）
TiltAngTH = 65535

# 碰撞系数（int，0~65534）
CollisionCoef = 65535


# ------------------------------------------------------------
# [voltage] 充电电压参数（float，0~65534 = 发送该值，65535 = 禁用）
# 任意一项不为 65535，Set_recharge_voltage 命令即会发送
# 示例：ReChargeV = 148.5
# ------------------------------------------------------------
[voltage]

# 回充触发电压（float，V）
ReChargeV = 65535

# 满充截止电压（float，V）
FullV = 65535


# ------------------------------------------------------------
# [version] 控制板硬件版本号（int，hex）
# 赋 4 字节 hex 值 = 发送，65535 = 不发送
# 帧格式：[头] 07 05 00 [VER高→低 4字节] [checkSum]
# 示例：Hardware_VER = 0x01020304
# ------------------------------------------------------------
[version]

# 硬件版本号（十六进制，65535 = 不发送）
Hardware_VER = 65535



